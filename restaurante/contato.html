<main>
    <div class="texto2">
        <h1>Entre em Contato</h1>
        <p style="text-align: center;">Faça sua reserva ou envie sua mensagem</p>
    </div>
    <section class="container py-5">
        <form method="post">
            <div class="row">
                <div class="col-md-12">
                    <input type="text" class="form-control" placeholder="Nome Completo" aria-label="Nome Completo" required>
                </div>
            </div>
            <br>
            <div class="row">
                <div class="col-md-6">
                    <input type="email" class="form-control" id="inputEmail4" placeholder="E-mail" required>
                </div>
                <div class="col-md-6">
                    <input type="tel" class="form-control" id="number" placeholder="Telefone" required>
                </div>
            </div>
            <br>
            <div class="row">
                <div class="col-md-4">
                    <input type="date" class="form-control" placeholder="Data da Reserva" required>
                </div>
                  <div class="col-md-4">
                    <input type="time" class="form-control" placeholder="Horário" required>
                </div>
                <div class="col-md-4">
                    <input type="number" class="form-control" placeholder="Quantidade de Pessoas" min="1" max="50" required>
                </div>
            </div>
            <br>
            <div class="form-floating">
                <textarea class="form-control" placeholder="Deixe sua mensagem aqui" id="floatingTextarea2" style="height: 100px"></textarea>
                <label for="floatingTextarea2">Observações</label>
            </div>
            <br>
            <div class="d-grid gap-2">
                <button class="btn btn-dark" type="submit">Enviar Reserva</button>
            </div>
        </form>
    </section>
</main>
<section class="bnt">
  <div class="btn-group" role="group" aria-label="Basic outlined example">
                    <button onclick="altenarContraste()" type="button" class="btn btn-outline-dark">Alternar Contraste</button>
                    <button onclick="diminuirFonte()" type="button" class="btn btn-outline-dark">Diminuir Fonte</button>
                    <button onclick="aumentarFonte()" type="button" class="btn btn-outline-dark">Aumentar Fonte</button>
                  </div>

                  <div>
                    <script>
                      function aumentarFonte() {
                      document.documentElement.style.fontSize = parseInt 
                      (getComputedStyle(document.documentElement).fontSize) + 1 + 'px'; }
                      function diminuirFonte() {
                      document.documentElement.style.fontSize = parseInt
                      (getComputedStyle(document.documentElement).fontSize) - 1 + 'px'; }
                    </script>
                     
                    <script>
                      function altenarContraste() {
                        document.body.classList.toggle('contraste');
                        }
                    </script>
                    
                    <div vw class="enabled">
                    <div vw-access-button class="active"></div>
                    <div vw-plugin-wrapper>
                    <div class="vw-plugin-top-wrapper"></div>
                    </div>
                    </div>
                    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
                    <script>
                      new window.VLibras.Widget('https://vlibras.gov.br/app');
                    </script>
                    </section>
