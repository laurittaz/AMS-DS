 <div class="texto2">
<h1>Entre em Contato</h1>
</div>
    <section class="container py-5">
            <form method="post">
                <div class="row">
                    <div class="col">
                      <input type="text" class="form-control" placeholder="Primeiro nome" aria-label="Primerio nome" required>
                    </div>
                    <div class="col">
                      <input type="text" class="form-control" placeholder="Sobrenome" aria-label="Sobrenome" required>
                    </div>
                  </div>
                  <br>
                  <div class="col-md-6">
                    <input type="email" class="form-control" id="inputEmail4" placeholder="Email" required>
                  </div>
                  <br>
                  <div class="col-md-6">
                    <input type="num" class="form-control" id="number" placeholder="Telefone" required>
                  </div>
                  <br>
                  <div class="form-floating">
                    <select class="form-select" id="floatingSelect" aria-label="Floating label select example">
                      <option selected>Selecione o destino de interesse</option>
                      <option value="1">Salvador</option>
                      <option value="2">Rio de Janeiro</option>
                      <option value="3">Fernando de Noronha</option>
                      <option value="4">Gramado</option>
                      <option value="5">Florianópolis</option>
                      <option value="6">Manaus</option>
                       <option value="7">Porto de Galinhas</option>
                    </select>
                    <label for="floatingSelect">Destino</label>
                  </div>
                  <br>
                  <div class="form-floating">
                    <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea2" style="height: 100px"></textarea>
                    <label for="floatingTextarea2">Mensagem</label>
                  </div>
                  <br>
                  <div class="d-grid gap-2">
                    <button class="btn btn-dark" type="submit">Enviar</button>
                  </div>
            </form>
        </section>
    </main>


 <section class="bnt">
  <div class="btn-group" role="group" aria-label="Basic outlined example">
                    <button onclick="altenarContraste()" type="button" class="btn btn-outline-dark">Alternar Contraste</button>
                    <button onclick="diminuirFonte()" type="button" class="btn btn-outline-dark">Diminuir Fonte</button>
                    <button onclick="aumentarFonte()" type="button" class="btn btn-outline-dark">Aumentar Fonte</button>
                  </div>

                  <div>
                    <script>
                      function aumentarFonte() {
                      document.documentElement.style.fontSize = parseInt 
                      (getComputedStyle(document.documentElement).fontSize) + 1 + 'px'; }
                      function diminuirFonte() {
                      document.documentElement.style.fontSize = parseInt
                      (getComputedStyle(document.documentElement).fontSize) - 1 + 'px'; }
                    </script>
                     
                    <script>
                      function altenarContraste() {
                        document.body.classList.toggle('contraste');
                        }
                    </script>
                    
                    <div vw class="enabled">
                    <div vw-access-button class="active"></div>
                    <div vw-plugin-wrapper>
                    <div class="vw-plugin-top-wrapper"></div>
                    </div>
                    </div>
                    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
                    <script>
                      new window.VLibras.Widget('https://vlibras.gov.br/app');
                    </script>
                    </section>
